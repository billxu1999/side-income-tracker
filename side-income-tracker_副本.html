<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>副业赚钱计划</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#e94560">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="副业记账">
<style>
  :root {
    --bg-primary: #0f0f1a;
    --bg-secondary: #1a1a2e;
    --bg-card: #16213e;
    --bg-card-hover: #1a2744;
    --accent: #e94560;
    --accent-light: #ff6b81;
    --accent-glow: rgba(233, 69, 96, 0.3);
    --green: #00d2d3;
    --green-light: #48dbfb;
    --green-glow: rgba(0, 210, 211, 0.25);
    --yellow: #feca57;
    --yellow-glow: rgba(254, 202, 87, 0.25);
    --purple: #a29bfe;
    --purple-glow: rgba(162, 155, 254, 0.25);
    --orange: #ff9f43;
    --text-primary: #eaf0fb;
    --text-secondary: #8892b0;
    --text-muted: #5a6380;
    --border: rgba(255,255,255,0.06);
    --radius: 16px;
    --radius-sm: 10px;
    --shadow: 0 8px 32px rgba(0,0,0,0.3);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(circle at 20% 50%, rgba(233,69,96,0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(0,210,211,0.05) 0%, transparent 50%),
                radial-gradient(circle at 50% 80%, rgba(162,155,254,0.04) 0%, transparent 50%);
    animation: bgFloat 20s ease-in-out infinite;
    z-index: 0;
  }

  @keyframes bgFloat {
    0%, 100% { transform: translate(0, 0) rotate(0deg); }
    33% { transform: translate(2%, -1%) rotate(1deg); }
    66% { transform: translate(-1%, 1%) rotate(-0.5deg); }
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 24px 16px 80px;
  }

  /* Header */
  .header {
    text-align: center;
    padding: 32px 0 24px;
  }
  .header h1 {
    font-size: 28px;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent-light), var(--green-light));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 1px;
  }
  .header p {
    color: var(--text-secondary);
    font-size: 14px;
    margin-top: 6px;
  }

  /* Navigation Tabs */
  .nav-tabs {
    display: flex;
    gap: 6px;
    background: var(--bg-secondary);
    padding: 6px;
    border-radius: var(--radius);
    margin-bottom: 24px;
    border: 1px solid var(--border);
  }
  .nav-tab {
    flex: 1;
    padding: 10px 8px;
    text-align: center;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    transition: all 0.3s ease;
    border: none;
    background: none;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .nav-tab:hover { color: var(--text-primary); background: rgba(255,255,255,0.04); }
  .nav-tab.active {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 4px 15px var(--accent-glow);
  }
  .nav-tab .icon { font-size: 16px; }

  /* Panel */
  .panel { display: none; animation: fadeIn 0.3s ease; }
  .panel.active { display: block; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

  /* Cards */
  .card {
    background: var(--bg-card);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
    border: 1px solid var(--border);
    transition: all 0.3s ease;
  }
  .card:hover { border-color: rgba(255,255,255,0.1); }
  .card-title {
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* Goal Progress */
  .goal-hero {
    text-align: center;
    padding: 28px 20px;
  }
  .progress-ring-container {
    position: relative;
    width: 180px;
    height: 180px;
    margin: 0 auto 20px;
  }
  .progress-ring-container svg { transform: rotate(-90deg); }
  .progress-ring-bg {
    fill: none;
    stroke: rgba(255,255,255,0.06);
    stroke-width: 10;
  }
  .progress-ring-fill {
    fill: none;
    stroke: url(#progressGradient);
    stroke-width: 10;
    stroke-linecap: round;
    transition: stroke-dashoffset 1s ease;
  }
  .progress-center {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
  }
  .progress-percent {
    font-size: 36px;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent-light), var(--green-light));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .progress-label { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

  .goal-stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    margin-top: 20px;
  }
  .goal-stat {
    text-align: center;
    padding: 14px 8px;
    background: rgba(255,255,255,0.03);
    border-radius: var(--radius-sm);
  }
  .goal-stat .value {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .goal-stat .label { font-size: 11px; color: var(--text-secondary); }
  .stat-earned .value { color: var(--green); }
  .stat-remaining .value { color: var(--accent-light); }
  .stat-days .value { color: var(--purple); }

  /* Goal Setting */
  .goal-form { display: grid; gap: 14px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
  }
  .form-input {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    color: var(--text-primary);
    font-size: 15px;
    outline: none;
    transition: all 0.3s ease;
    font-family: inherit;
  }
  .form-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }
  .form-input::placeholder { color: var(--text-muted); }

  .btn {
    padding: 12px 24px;
    border-radius: var(--radius-sm);
    border: none;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s ease;
    font-family: inherit;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent-light));
    color: #fff;
    box-shadow: 0 4px 15px var(--accent-glow);
  }
  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px var(--accent-glow);
  }
  .btn-green {
    background: linear-gradient(135deg, #00b894, var(--green));
    color: #fff;
    box-shadow: 0 4px 15px var(--green-glow);
  }
  .btn-green:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px var(--green-glow);
  }
  .btn-outline {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-secondary);
  }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent-light); }
  .btn-sm { padding: 8px 14px; font-size: 12px; }
  .btn-danger {
    background: rgba(233,69,96,0.15);
    color: var(--accent-light);
    border: 1px solid rgba(233,69,96,0.2);
  }
  .btn-danger:hover { background: rgba(233,69,96,0.25); }

  /* Goal action buttons */
  .goal-actions {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 14px;
  }
  .goal-actions .btn { font-size: 12px; padding: 8px 16px; }

  /* Modal / Confirm dialog */
  .modal-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(6px);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
  }
  .modal-overlay.show {
    opacity: 1;
    pointer-events: auto;
  }
  .modal-box {
    background: var(--bg-card);
    border-radius: var(--radius);
    padding: 28px;
    max-width: 360px;
    width: 90%;
    text-align: center;
    border: 1px solid var(--border);
    transform: scale(0.9);
    transition: transform 0.25s ease;
  }
  .modal-overlay.show .modal-box { transform: scale(1); }
  .modal-box .icon { font-size: 40px; margin-bottom: 14px; }
  .modal-box .title { font-size: 17px; font-weight:700; margin-bottom:8px; }
  .modal-box .desc { font-size:13px; color:var(--text-secondary); margin-bottom:22px; line-height:1.5; }
  .modal-buttons { display:flex; gap:10px; justify-content:center; }
  .modal-buttons .btn { min-width:90px; }

  /* Record Form */
  .record-form {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .record-form .full-width { grid-column: 1 / -1; }

  /* Source Tags */
  .source-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 8px;
  }
  .source-tag {
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.03);
    color: var(--text-secondary);
    transition: all 0.3s ease;
  }
  .source-tag:hover { border-color: var(--green); color: var(--green); }
  .source-tag.active {
    background: linear-gradient(135deg, rgba(0,210,211,0.2), rgba(72,219,251,0.15));
    border-color: var(--green);
    color: var(--green-light);
  }

  /* Records List */
  .records-list { display: flex; flex-direction: column; gap: 8px; }
  .record-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 16px;
    background: rgba(255,255,255,0.02);
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    transition: all 0.3s ease;
  }
  .record-item:hover { background: rgba(255,255,255,0.04); }
  .record-source-icon {
    width: 40px; height: 40px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .record-info { flex: 1; min-width: 0; }
  .record-source-name {
    font-size: 14px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .record-note {
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .record-right { text-align: right; flex-shrink: 0; }
  .record-amount {
    font-size: 16px;
    font-weight: 700;
    color: var(--green);
  }
  .record-date { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .record-delete {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    padding: 4px;
    font-size: 16px;
    transition: color 0.2s;
    flex-shrink: 0;
  }
  .record-delete:hover { color: var(--accent); }

  /* Filter Row */
  .filter-row {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }
  .filter-chip {
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 12px;
    cursor: pointer;
    border: 1px solid var(--border);
    background: none;
    color: var(--text-secondary);
    transition: all 0.2s;
  }
  .filter-chip:hover { border-color: var(--accent); color: var(--accent-light); }
  .filter-chip.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  /* Chart Area */
  .chart-container {
    position: relative;
    height: 220px;
    margin: 10px 0;
  }
  .chart-container canvas { width: 100% !important; height: 100% !important; }

  /* Source Breakdown */
  .source-breakdown { display: flex; flex-direction: column; gap: 10px; }
  .source-bar-item { display: flex; align-items: center; gap: 12px; }
  .source-bar-label {
    width: 70px;
    font-size: 13px;
    font-weight: 600;
    text-align: right;
    flex-shrink: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .source-bar-track {
    flex: 1;
    height: 24px;
    background: rgba(255,255,255,0.04);
    border-radius: 12px;
    overflow: hidden;
    position: relative;
  }
  .source-bar-fill {
    height: 100%;
    border-radius: 12px;
    transition: width 0.8s ease;
    position: relative;
    min-width: 2px;
  }
  .source-bar-amount {
    font-size: 13px;
    font-weight: 700;
    width: 80px;
    text-align: right;
    flex-shrink: 0;
  }

  /* Milestones */
  .milestones { display: flex; flex-direction: column; gap: 10px; }
  .milestone {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    border-radius: var(--radius-sm);
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border);
  }
  .milestone.achieved { border-color: rgba(0,210,211,0.3); background: rgba(0,210,211,0.05); }
  .milestone-icon { font-size: 22px; }
  .milestone-info { flex: 1; }
  .milestone-name { font-size: 13px; font-weight: 600; }
  .milestone-target { font-size: 11px; color: var(--text-muted); }
  .milestone-status {
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 10px;
  }
  .milestone.achieved .milestone-status {
    background: rgba(0,210,211,0.15);
    color: var(--green);
  }
  .milestone:not(.achieved) .milestone-status {
    background: rgba(255,255,255,0.05);
    color: var(--text-muted);
  }

  /* Empty State */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-muted);
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--bg-card);
    border: 1px solid var(--green);
    color: var(--green);
    padding: 12px 24px;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 600;
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    z-index: 999;
    transition: transform 0.4s ease;
    pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Monthly summary mini cards */
  .mini-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }
  .mini-stat {
    padding: 14px;
    background: rgba(255,255,255,0.03);
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
  }
  .mini-stat .label {
    font-size: 11px;
    color: var(--text-secondary);
    margin-bottom: 4px;
  }
  .mini-stat .value {
    font-size: 20px;
    font-weight: 700;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

  /* Responsive */
  @media (max-width: 600px) {
    .record-form { grid-template-columns: 1fr; }
    .goal-stats { grid-template-columns: 1fr 1fr; }
    .header h1 { font-size: 22px; }
    .nav-tab { font-size: 11px; padding: 8px 4px; }
    .nav-tab .tab-text { display: none; }
    .nav-tab .icon { font-size: 20px; }
  }

  /* Animations */
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }
  .celebrate { animation: pulse 0.5s ease 3; }
</style>
</head>
<body>

<div class="app">
  <!-- Header -->
  <div class="header">
    <h1>💰 副业赚钱计划</h1>
    <p>记录每一笔副业收入，向目标稳步前进</p>
  </div>

  <!-- Navigation -->
  <div class="nav-tabs">
    <button class="nav-tab active" data-panel="dashboard" onclick="switchPanel('dashboard')">
      <span class="icon">📊</span><span class="tab-text">看板</span>
    </button>
    <button class="nav-tab" data-panel="record" onclick="switchPanel('record')">
      <span class="icon">✏️</span><span class="tab-text">记账</span>
    </button>
    <button class="nav-tab" data-panel="analysis" onclick="switchPanel('analysis')">
      <span class="icon">📈</span><span class="tab-text">分析</span>
    </button>
    <button class="nav-tab" data-panel="goal" onclick="switchPanel('goal')">
      <span class="icon">🎯</span><span class="tab-text">目标</span>
    </button>
  </div>

  <!-- Dashboard Panel -->
  <div class="panel active" id="panel-dashboard">
    <div class="card goal-hero" id="dashboardGoalCard">
      <!-- Filled by JS -->
    </div>

    <div class="mini-stats" id="dashboardMiniStats">
      <!-- Filled by JS -->
    </div>

    <div class="card">
      <div class="card-title">🏅 里程碑</div>
      <div class="milestones" id="milestonesList">
        <!-- Filled by JS -->
      </div>
    </div>

    <div class="card">
      <div class="card-title">🕐 最近记录</div>
      <div class="records-list" id="recentRecords">
        <!-- Filled by JS -->
      </div>
    </div>
  </div>

  <!-- Record Panel -->
  <div class="panel" id="panel-record">
    <div class="card">
      <div class="card-title">📝 新增收入</div>
      <div class="record-form">
        <div class="form-group">
          <label>金额 (¥)</label>
          <input type="number" class="form-input" id="inputAmount" placeholder="0.00" step="0.01" min="0">
        </div>
        <div class="form-group">
          <label>日期</label>
          <input type="date" class="form-input" id="inputDate">
        </div>
        <div class="form-group full-width">
          <label>收入来源</label>
          <div class="source-tags" id="sourceTags">
            <!-- Filled by JS -->
          </div>
          <input type="text" class="form-input" id="inputSource" placeholder="或自定义来源...">
        </div>
        <div class="form-group full-width">
          <label>备注</label>
          <input type="text" class="form-input" id="inputNote" placeholder="可选，简短备注">
        </div>
        <div class="full-width">
          <button class="btn btn-green" style="width:100%" onclick="addRecord()">+ 记一笔</button>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">📋 收入明细</div>
      <div class="filter-row" id="filterRow">
        <!-- Filled by JS -->
      </div>
      <div class="records-list" id="allRecords">
        <!-- Filled by JS -->
      </div>
    </div>
  </div>

  <!-- Analysis Panel -->
  <div class="panel" id="panel-analysis">
    <div class="card">
      <div class="card-title">📈 月度收入趋势</div>
      <div class="chart-container">
        <canvas id="trendChart"></canvas>
      </div>
    </div>

    <div class="card">
      <div class="card-title">🏷️ 收入来源构成</div>
      <div class="chart-container" style="height:200px">
        <canvas id="sourceChart"></canvas>
      </div>
    </div>

    <div class="card">
      <div class="card-title">📊 来源排行</div>
      <div class="source-breakdown" id="sourceBreakdown">
        <!-- Filled by JS -->
      </div>
    </div>
  </div>

  <!-- Goal Panel -->
  <div class="panel" id="panel-goal">
    <div class="card" id="goalCurrentCard">
      <!-- Filled by JS -->
    </div>

    <div class="card">
      <div class="card-title">🎯 设定新目标</div>
      <div class="goal-form">
        <div class="form-group">
          <label>目标金额 (¥)</label>
          <input type="number" class="form-input" id="goalAmount" placeholder="例如 10000" min="1">
        </div>
        <div class="form-group">
          <label>目标名称</label>
          <input type="text" class="form-input" id="goalName" placeholder="例如：年度副业收入目标">
        </div>
        <div class="form-group">
          <label>截止日期</label>
          <input type="date" class="form-input" id="goalDeadline">
        </div>
        <div>
          <button class="btn btn-primary" style="width:100%" onclick="setGoal()">确认设定目标</button>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">💡 赚钱小贴士</div>
      <div style="font-size:13px; color:var(--text-secondary); line-height:1.8;" id="tipsArea">
      </div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Confirm Modal -->
<div class="modal-overlay" id="confirmModal">
  <div class="modal-box">
    <div class="icon" id="modalIcon">⚠️</div>
    <div class="title" id="modalTitle">确认操作</div>
    <div class="desc" id="modalDesc">确定要执行此操作吗？</div>
    <div class="modal-buttons">
      <button class="btn btn-outline btn-sm" onclick="closeModal(false)">取消</button>
      <button class="btn btn-danger btn-sm" id="modalConfirmBtn" onclick="closeModal(true)">确认</button>
    </div>
  </div>
</div>

<!-- SVG for progress ring gradient -->
<svg width="0" height="0" style="position:absolute">
  <defs>
    <linearGradient id="progressGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#48dbfb"/>
    </linearGradient>
  </defs>
</svg>

<script>
// ========== DATA LAYER ==========
const STORAGE_KEY = 'sideIncomeTracker';

const DEFAULT_SOURCES = ['自由职业', '兼职', '自媒体', '投资理财', '电商', '知识付费', '设计外包', '技术接单', '咨询服务', '其他'];
const SOURCE_COLORS = {
  '自由职业': '#e94560',
  '兼职': '#ff9f43',
  '自媒体': '#48dbfb',
  '投资理财': '#00d2d3',
  '电商': '#a29bfe',
  '知识付费': '#feca57',
  '设计外包': '#ff6b81',
  '技术接单': '#55efc4',
  '咨询服务': '#74b9ff',
  '其他': '#636e72'
};
const MILESTONES = [
  { amount: 100, icon: '🌱', name: '初出茅庐' },
  { amount: 500, icon: '🌿', name: '小有收获' },
  { amount: 1000, icon: '🌳', name: '渐入佳境' },
  { amount: 5000, icon: '🏆', name: '副业达人' },
  { amount: 10000, icon: '💎', name: '收入专家' },
  { amount: 50000, icon: '🚀', name: '财富自由之路' },
  { amount: 100000, icon: '👑', name: '副业之王' }
];
const TIPS = [
  '📌 坚持记录每一笔收入，哪怕很小——积少成多的力量超乎想象',
  '📌 专注于1-2个核心来源深耕，比同时做很多事更有效',
  '📌 月末回顾收入趋势，及时调整策略',
  '📌 把副业收入的一部分再投资到自己身上（学习、工具）',
  '📌 设定阶段性小目标，比一个大目标更容易坚持',
  '📌 利用碎片时间做副业，通勤、午休都是好时机',
  '📌 建立个人品牌，长期来看这是最值钱的资产',
  '📌 复利思维：技能积累和收入增长都是复利曲线'
];

function loadData() {
  try {
    const data = localStorage.getItem(STORAGE_KEY);
    return data ? JSON.parse(data) : { goal: null, records: [] };
  } catch { return { goal: null, records: [] }; }
}

function saveData(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function getData() { return loadData(); }
function setData(data) { saveData(data); }

// ========== UTILITY ==========
function formatMoney(n) {
  return n.toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function todayStr() {
  return new Date().toISOString().split('T')[0];
}

function getSourceColor(source) {
  return SOURCE_COLORS[source] || '#a29bfe';
}

// ========== PANEL SWITCHING ==========
function switchPanel(name) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  document.querySelector(`.nav-tab[data-panel="${name}"]`).classList.add('active');
  if (name === 'dashboard') renderDashboard();
  if (name === 'record') renderRecordPanel();
  if (name === 'analysis') renderAnalysis();
  if (name === 'goal') renderGoalPanel();
}

// ========== GOAL ==========
let pendingAction = null; // for confirm modal

function setGoal() {
  const amount = parseFloat(document.getElementById('goalAmount').value);
  const name = document.getElementById('goalName').value.trim();
  const deadline = document.getElementById('goalDeadline').value;

  if (!amount || amount <= 0) { showToast('请输入有效的目标金额'); return; }
  if (!name) { showToast('请输入目标名称'); return; }
  if (!deadline) { showToast('请选择截止日期'); return; }

  const data = getData();
  data.goal = { amount, name, deadline, createdAt: todayStr() };
  setData(data);

  // Clear form
  document.getElementById('goalAmount').value = '';
  document.getElementById('goalName').value = '';
  document.getElementById('goalDeadline').value = '';

  showToast('🎯 目标设定成功！');
  renderGoalPanel();
  renderDashboard();
}

function enterEditMode() {
  const data = getData();
  if (!data.goal) return;
  
  // Fill form with current values
  document.getElementById('goalAmount').value = data.goal.amount;
  document.getElementById('goalName').value = data.goal.name;
  document.getElementById('goalDeadline').value = data.goal.deadline;

  // Scroll to form and highlight
  const goalForm = document.querySelector('#panel-goal .card:nth-child(2)');
  if (goalForm) {
    goalForm.style.boxShadow = '0 0 20px var(--accent-glow)';
    setTimeout(() => { goalForm.style.boxShadow = ''; }, 2000);
    goalForm.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  showToast('✏️ 已将当前目标填入下方表单，修改后点击"确认设定目标"即可更新');
}

function showConfirm(icon, title, desc, onConfirm) {
  document.getElementById('modalIcon').textContent = icon;
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalDesc').textContent = desc;
  document.getElementById('confirmModal').classList.add('show');
  pendingAction = onConfirm;
}

function closeModal(confirmed) {
  document.getElementById('confirmModal').classList.remove('show');
  if (confirmed && typeof pendingAction === 'function') {
    pendingAction();
  }
  pendingAction = null;
}

function deleteGoal() {
  showConfirm(
    '🗑️',
    '删除目标',
    '确定要删除当前目标吗？已记录的收入数据不会受影响。',
    () => {
      const data = getData();
      data.goal = null;
      setData(data);
      showToast('目标已删除');
      renderGoalPanel();
      renderDashboard();
    }
  );
}

function renderGoalPanel() {
  const data = getData();
  const card = document.getElementById('goalCurrentCard');
  const total = data.records.reduce((s, r) => s + r.amount, 0);

  if (data.goal) {
    const remaining = Math.max(0, data.goal.amount - total);
    const daysLeft = Math.max(0, Math.ceil((new Date(data.goal.deadline) - new Date()) / 86400000));
    
    // Check if expired
    const isExpired = new Date(data.goal.deadline) < new Date();
    const statusBadge = isExpired 
      ? '<span style="font-size:11px; color:var(--yellow); background:var(--yellow-glow); padding:2px 8px; border-radius:10px;">⚠️ 已过期</span>'
      : daysLeft <= 7 
        ? '<span style="font-size:11px; color:var(--accent-light); background:var(--accent-glow); padding:2px 8px; border-radius:10px;">⏰ 即将截止</span>'
        : '';

    card.innerHTML = `
      <div class="card-title">🎯 当前目标 ${statusBadge}</div>
      <div style="text-align:center; padding: 10px 0;">
        <div style="font-size:22px; font-weight:800; margin-bottom:6px;">${data.goal.name}</div>
        <div style="font-size:14px; color:var(--text-secondary);">目标 ¥${formatMoney(data.goal.amount)} · 截止 ${data.goal.deadline}</div>
        <div style="margin-top:16px; display:flex; justify-content:center; gap:24px;">
          <div><div style="font-size:18px; font-weight:700; color:var(--green);">¥${formatMoney(total)}</div><div style="font-size:11px; color:var(--text-muted);">已赚</div></div>
          <div><div style="font-size:18px; font-weight:700; color:var(--accent-light);">¥${formatMoney(remaining)}</div><div style="font-size:11px; color:var(--text-muted);">剩余</div></div>
          <div><div style="font-size:18px; font-weight:700; color:${isExpired ? 'var(--yellow)' : 'var(--purple)'}">${daysLeft}天</div><div style="font-size:11px; color:var(--text-muted);">${isExpired ? '已过' : '剩余'}天数</div></div>
        </div>
        <div class="goal-actions">
          <button class="btn btn-outline btn-sm" onclick="enterEditMode()">✏️ 编辑目标</button>
          <button class="btn btn-danger btn-sm" onclick="deleteGoal()">🗑️ 删除目标</button>
        </div>
      </div>
    `;
  } else {
    card.innerHTML = `
      <div style="text-align:center; padding:20px; color:var(--text-muted);">
        <div style="font-size:36px; margin-bottom:10px;">🎯</div>
        <p>还没有设定目标</p>
        <p style="font-size:12px; margin-top:4px;">在下方设定你的副业赚钱目标吧</p>
      </div>
    `;
  }

  // Tips
  const tipsArea = document.getElementById('tipsArea');
  tipsArea.innerHTML = TIPS.map(t => `<div style="margin-bottom:6px;">${t}</div>`).join('');
}

// ========== RECORDS ==========
let selectedSource = '';
let currentFilter = '全部';

function addRecord() {
  const amount = parseFloat(document.getElementById('inputAmount').value);
  const date = document.getElementById('inputDate').value;
  const source = document.getElementById('inputSource').value.trim() || selectedSource;
  const note = document.getElementById('inputNote').value.trim();

  if (!amount || amount <= 0) { showToast('请输入有效金额'); return; }
  if (!date) { showToast('请选择日期'); return; }
  if (!source) { showToast('请选择或输入收入来源'); return; }

  const data = getData();
  data.records.push({
    id: Date.now(),
    amount,
    date,
    source,
    note,
    createdAt: new Date().toISOString()
  });
  setData(data);

  // Reset form
  document.getElementById('inputAmount').value = '';
  document.getElementById('inputNote').value = '';
  document.getElementById('inputSource').value = '';
  selectedSource = '';
  renderSourceTags();

  showToast(`✅ 已记录 ¥${formatMoney(amount)}`);
  renderRecordPanel();
}

function deleteRecord(id) {
  showConfirm(
    '🗑️',
    '删除记录',
    '确定要删除这条收入记录吗？删除后无法恢复。',
    () => {
      const data = getData();
      data.records = data.records.filter(r => r.id !== id);
      setData(data);
      showToast('已删除');
      renderRecordPanel();
      renderDashboard();
    }
  );
}

function renderSourceTags() {
  const container = document.getElementById('sourceTags');
  container.innerHTML = DEFAULT_SOURCES.map(s =>
    `<span class="source-tag ${selectedSource === s ? 'active' : ''}" onclick="selectSource('${s}')">${s}</span>`
  ).join('');
}

function selectSource(s) {
  selectedSource = selectedSource === s ? '' : s;
  document.getElementById('inputSource').value = selectedSource;
  renderSourceTags();
}

function renderRecordPanel() {
  const data = getData();

  // Set default date
  const dateInput = document.getElementById('inputDate');
  if (!dateInput.value) dateInput.value = todayStr();

  renderSourceTags();

  // Filters
  const sources = [...new Set(data.records.map(r => r.source))];
  const filterRow = document.getElementById('filterRow');
  filterRow.innerHTML = `<button class="filter-chip ${currentFilter === '全部' ? 'active' : ''}" onclick="setFilter('全部')">全部</button>` +
    sources.map(s => `<button class="filter-chip ${currentFilter === s ? 'active' : ''}" onclick="setFilter('${s}')">${s}</button>`).join('');

  // Records list
  let records = [...data.records].sort((a, b) => b.date.localeCompare(a.date) || b.id - a.id);
  if (currentFilter !== '全部') records = records.filter(r => r.source === currentFilter);

  const container = document.getElementById('allRecords');
  if (records.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="icon">📝</div><p>还没有记录，快去记一笔吧</p></div>';
    return;
  }

  container.innerHTML = records.map(r => `
    <div class="record-item">
      <div class="record-source-icon" style="background:${getSourceColor(r.source)}22; color:${getSourceColor(r.source)}">
        ${getSourceEmoji(r.source)}
      </div>
      <div class="record-info">
        <div class="record-source-name">${r.source}</div>
        <div class="record-note">${r.note || '—'}</div>
      </div>
      <div class="record-right">
        <div class="record-amount">+¥${formatMoney(r.amount)}</div>
        <div class="record-date">${r.date}</div>
      </div>
      <button class="record-delete" onclick="deleteRecord(${r.id})">✕</button>
    </div>
  `).join('');
}

function setFilter(f) {
  currentFilter = f;
  renderRecordPanel();
}

function getSourceEmoji(source) {
  const map = {
    '自由职业': '💻', '兼职': '🕐', '自媒体': '📱', '投资理财': '📈',
    '电商': '🛒', '知识付费': '📚', '设计外包': '🎨', '技术接单': '⚙️',
    '咨询服务': '🤝', '其他': '📦'
  };
  return map[source] || '💰';
}

// ========== DASHBOARD ==========
function renderDashboard() {
  const data = getData();
  const total = data.records.reduce((s, r) => s + r.amount, 0);
  const goalCard = document.getElementById('dashboardGoalCard');

  if (data.goal) {
    const percent = Math.min(100, (total / data.goal.amount) * 100);
    const circumference = 2 * Math.PI * 75;
    const offset = circumference - (percent / 100) * circumference;
    const remaining = Math.max(0, data.goal.amount - total);
    const daysLeft = Math.max(0, Math.ceil((new Date(data.goal.deadline) - new Date()) / 86400000));

    goalCard.innerHTML = `
      <div class="goal-hero">
        <div class="progress-ring-container">
          <svg width="180" height="180" viewBox="0 0 180 180">
            <circle class="progress-ring-bg" cx="90" cy="90" r="75"/>
            <circle class="progress-ring-fill" cx="90" cy="90" r="75"
              stroke-dasharray="${circumference}"
              stroke-dashoffset="${offset}"/>
          </svg>
          <div class="progress-center">
            <div class="progress-percent">${percent.toFixed(1)}%</div>
            <div class="progress-label">完成进度</div>
          </div>
        </div>
        <div style="font-size:18px; font-weight:800; margin-bottom:4px;">${data.goal.name}</div>
        <div style="font-size:13px; color:var(--text-secondary);">目标 ¥${formatMoney(data.goal.amount)}</div>
        <div class="goal-stats">
          <div class="goal-stat stat-earned">
            <div class="value">¥${formatMoney(total)}</div>
            <div class="label">已赚</div>
          </div>
          <div class="goal-stat stat-remaining">
            <div class="value">¥${formatMoney(remaining)}</div>
            <div class="label">剩余</div>
          </div>
          <div class="goal-stat stat-days">
            <div class="value">${daysLeft}</div>
            <div class="label">剩余天数</div>
          </div>
        </div>
      </div>
    `;
  } else {
    goalCard.innerHTML = `
      <div class="goal-hero">
        <div style="font-size:48px; margin-bottom:12px;">🎯</div>
        <div style="font-size:18px; font-weight:700; margin-bottom:6px;">¥${formatMoney(total)}</div>
        <div style="font-size:13px; color:var(--text-secondary); margin-bottom:16px;">累计副业收入</div>
        <button class="btn btn-primary btn-sm" onclick="switchPanel('goal')">设定目标</button>
      </div>
    `;
  }

  // Mini stats
  const now = new Date();
  const thisMonth = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const thisWeekStart = new Date(now);
  thisWeekStart.setDate(now.getDate() - now.getDay());
  const weekStartStr = thisWeekStart.toISOString().split('T')[0];

  const monthTotal = data.records.filter(r => r.date.startsWith(thisMonth)).reduce((s,r) => s+r.amount, 0);
  const weekTotal = data.records.filter(r => r.date >= weekStartStr).reduce((s,r) => s+r.amount, 0);
  const recordCount = data.records.length;
  const avgPerRecord = recordCount > 0 ? total / recordCount : 0;

  document.getElementById('dashboardMiniStats').innerHTML = `
    <div class="mini-stat">
      <div class="label">本月收入</div>
      <div class="value" style="color:var(--green)">¥${formatMoney(monthTotal)}</div>
    </div>
    <div class="mini-stat">
      <div class="label">本周收入</div>
      <div class="value" style="color:var(--green-light)">¥${formatMoney(weekTotal)}</div>
    </div>
    <div class="mini-stat">
      <div class="label">记录笔数</div>
      <div class="value" style="color:var(--purple)">${recordCount}</div>
    </div>
    <div class="mini-stat">
      <div class="label">笔均收入</div>
      <div class="value" style="color:var(--yellow)">¥${formatMoney(avgPerRecord)}</div>
    </div>
  `;

  // Milestones
  const milestonesList = document.getElementById('milestonesList');
  milestonesList.innerHTML = MILESTONES.map(m => {
    const achieved = total >= m.amount;
    return `
      <div class="milestone ${achieved ? 'achieved' : ''}">
        <div class="milestone-icon">${m.icon}</div>
        <div class="milestone-info">
          <div class="milestone-name">${m.name}</div>
          <div class="milestone-target">¥${formatMoney(m.amount)}</div>
        </div>
        <div class="milestone-status">${achieved ? '已达成' : '未达成'}</div>
      </div>
    `;
  }).join('');

  // Recent records
  const recent = [...data.records].sort((a,b) => b.date.localeCompare(a.date) || b.id - a.id).slice(0, 5);
  const recentContainer = document.getElementById('recentRecords');
  if (recent.length === 0) {
    recentContainer.innerHTML = '<div class="empty-state"><div class="icon">📝</div><p>还没有记录</p></div>';
  } else {
    recentContainer.innerHTML = recent.map(r => `
      <div class="record-item">
        <div class="record-source-icon" style="background:${getSourceColor(r.source)}22; color:${getSourceColor(r.source)}">
          ${getSourceEmoji(r.source)}
        </div>
        <div class="record-info">
          <div class="record-source-name">${r.source}</div>
          <div class="record-note">${r.note || '—'}</div>
        </div>
        <div class="record-right">
          <div class="record-amount">+¥${formatMoney(r.amount)}</div>
          <div class="record-date">${r.date}</div>
        </div>
      </div>
    `).join('');
  }
}

// ========== ANALYSIS ==========
function renderAnalysis() {
  const data = getData();
  renderTrendChart(data);
  renderSourceChart(data);
  renderSourceBreakdown(data);
}

function renderTrendChart(data) {
  const canvas = document.getElementById('trendChart');
  const ctx = canvas.getContext('2d');

  // Get last 6 months
  const months = [];
  const now = new Date();
  for (let i = 5; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    months.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`);
  }

  const monthlyData = months.map(m => ({
    label: m.substring(5), // MM
    value: data.records.filter(r => r.date.startsWith(m)).reduce((s,r) => s+r.amount, 0)
  }));

  const maxVal = Math.max(...monthlyData.map(d => d.value), 1);

  // Draw
  const W = canvas.parentElement.clientWidth - 40;
  const H = 200;
  canvas.width = W * 2;
  canvas.height = H * 2;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.scale(2, 2);

  const padding = { top: 20, right: 20, bottom: 30, left: 50 };
  const chartW = W - padding.left - padding.right;
  const chartH = H - padding.top - padding.bottom;

  // Grid lines
  ctx.strokeStyle = 'rgba(255,255,255,0.05)';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = padding.top + (chartH / 4) * i;
    ctx.beginPath();
    ctx.moveTo(padding.left, y);
    ctx.lineTo(W - padding.right, y);
    ctx.stroke();

    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText('¥' + Math.round(maxVal - (maxVal/4)*i), padding.left - 6, y + 4);
  }

  // Bars
  const barWidth = chartW / months.length * 0.5;
  const gap = chartW / months.length;

  monthlyData.forEach((d, i) => {
    const x = padding.left + gap * i + (gap - barWidth) / 2;
    const barH = maxVal > 0 ? (d.value / maxVal) * chartH : 0;
    const y = padding.top + chartH - barH;

    // Bar gradient
    const grad = ctx.createLinearGradient(x, y, x, padding.top + chartH);
    grad.addColorStop(0, '#48dbfb');
    grad.addColorStop(1, 'rgba(72,219,251,0.1)');

    ctx.fillStyle = grad;
    ctx.beginPath();
    const r = Math.min(4, barWidth/2);
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + barWidth - r, y);
    ctx.quadraticCurveTo(x + barWidth, y, x + barWidth, y + r);
    ctx.lineTo(x + barWidth, padding.top + chartH);
    ctx.lineTo(x, padding.top + chartH);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.fill();

    // Value on top
    if (d.value > 0) {
      ctx.fillStyle = '#48dbfb';
      ctx.font = 'bold 10px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('¥' + Math.round(d.value), x + barWidth/2, y - 6);
    }

    // Label
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.font = '11px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(d.label + '月', x + barWidth/2, H - 8);
  });
}

function renderSourceChart(data) {
  const canvas = document.getElementById('sourceChart');
  const ctx = canvas.getContext('2d');

  // Group by source
  const sourceMap = {};
  data.records.forEach(r => {
    sourceMap[r.source] = (sourceMap[r.source] || 0) + r.amount;
  });
  const entries = Object.entries(sourceMap).sort((a,b) => b[1] - a[1]);
  const total = entries.reduce((s,e) => s + e[1], 0);

  if (entries.length === 0) {
    canvas.width = 0; canvas.height = 0;
    return;
  }

  const W = canvas.parentElement.clientWidth - 40;
  const H = 180;
  canvas.width = W * 2;
  canvas.height = H * 2;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.scale(2, 2);

  // Donut chart
  const cx = W / 2;
  const cy = H / 2;
  const outerR = Math.min(cx, cy) - 20;
  const innerR = outerR * 0.55;
  let startAngle = -Math.PI / 2;

  entries.forEach(([source, value]) => {
    const sliceAngle = (value / total) * 2 * Math.PI;
    const endAngle = startAngle + sliceAngle;

    ctx.beginPath();
    ctx.arc(cx, cy, outerR, startAngle, endAngle);
    ctx.arc(cx, cy, innerR, endAngle, startAngle, true);
    ctx.closePath();
    ctx.fillStyle = getSourceColor(source);
    ctx.fill();

    startAngle = endAngle;
  });

  // Center text
  ctx.fillStyle = '#eaf0fb';
  ctx.font = 'bold 16px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('¥' + Math.round(total), cx, cy + 2);
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.font = '10px sans-serif';
  ctx.fillText('总收入', cx, cy + 16);

  // Legend
  const legendX = 10;
  let legendY = H - 8;
  ctx.font = '10px sans-serif';
  entries.slice(0, 5).forEach(([source, value], i) => {
    const x = legendX + i * (W / 5);
    ctx.fillStyle = getSourceColor(source);
    ctx.fillRect(x, legendY - 8, 8, 8);
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.textAlign = 'left';
    ctx.fillText(source, x + 11, legendY);
  });
}

function renderSourceBreakdown(data) {
  const sourceMap = {};
  data.records.forEach(r => {
    sourceMap[r.source] = (sourceMap[r.source] || 0) + r.amount;
  });
  const entries = Object.entries(sourceMap).sort((a,b) => b[1] - a[1]);
  const maxVal = entries.length > 0 ? entries[0][1] : 1;

  const container = document.getElementById('sourceBreakdown');
  if (entries.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="icon">📊</div><p>暂无数据</p></div>';
    return;
  }

  container.innerHTML = entries.map(([source, value]) => {
    const pct = (value / maxVal) * 100;
    const color = getSourceColor(source);
    return `
      <div class="source-bar-item">
        <div class="source-bar-label">${source}</div>
        <div class="source-bar-track">
          <div class="source-bar-fill" style="width:${pct}%; background:linear-gradient(90deg, ${color}, ${color}88);"></div>
        </div>
        <div class="source-bar-amount" style="color:${color}">¥${formatMoney(value)}</div>
      </div>
    `;
  }).join('');
}

// ========== INIT ==========
function init() {
  renderDashboard();
}

// Handle resize for charts
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    const activePanel = document.querySelector('.panel.active');
    if (activePanel && activePanel.id === 'panel-analysis') {
      renderAnalysis();
    }
  }, 200);
});

init();

// Register Service Worker for PWA
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}
</script>
